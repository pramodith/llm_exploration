model_name: "LlamaForCausalLM"

parent_model_config:
  "attention_bias": false
  "attention_dropout": 0.0
  "bos_token_id": 1
  "eos_token_id": 2
  "hidden_act": "silu"
  "hidden_size": 2048
  "initializer_range": 0.02
  "intermediate_size": 8192
  "max_position_embeddings": 8192
  "mlp_bias": false
  "model_type": "llama"
  "num_attention_heads": 32
  "num_hidden_layers": 24
  "num_key_value_heads": 32
  "pad_token_id": 2
  "pretraining_tp": 1
  "rms_norm_eps": 1e-05
  "rope_scaling": null
  "rope_theta": 130000
  "tie_word_embeddings": true
  "torch_dtype": bfloat16
  "use_cache": true
  "vocab_size": 49152

target_model_config:
  "attention_bias": false
  "attention_dropout": 0.0
  "bos_token_id": 1
  "eos_token_id": 2
  "hidden_act": "silu"
  "intermediate_size": 4096
  "max_position_embeddings": 8192
  "mlp_bias": false
  "model_type": "llama"
  "num_attention_heads": 16
  "num_hidden_layers": 12
  "num_key_value_heads": 16
  "pad_token_id": 2
  "pretraining_tp": 1
  "rms_norm_eps": 1e-05
  "rope_scaling": null
  "rope_theta": 130000
  "tie_word_embeddings": true
  "torch_dtype": bfloat16
  "use_cache": true
  "vocab_size": 49152

training:
  learning_rate: 3e-4
  warmup_steps: 1000
  max_steps: 100
  batch_size: 8
  gradient_accumulation_steps: 2
  context_length: 512
  eval_steps: 10
  save_steps: 50
  logging_steps: 10
  seed: 42

dataset: "wikitext-2"
temperature: 1.0